name: Build AppImage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  NODE_OPTIONS: --no-deprecation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to publish, for example v0.1. Leave empty to only build."
        required: false
        type: string
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            appstream \
            libegl1 \
            libfuse2 \
            libgl1 \
            libglib2.0-0 \
            libsm6 \
            libx11-xcb1 \
            libxcb-cursor0 \
            libxcb-glx0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxext6 \
            libxkbcommon-x11-0 \
            patchelf

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install . pyinstaller

      - name: Download appimagetool
        run: |
          curl -L \
            -o appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage

      - name: Build AppImage
        env:
          APPIMAGE_TOOL: ${{ github.workspace }}/appimagetool.AppImage
        run: |
          chmod +x scripts/build_appimage.sh packaging/linux/AppRun
          ./scripts/build_appimage.sh

      - name: Rename AppImage for release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        run: |
          arch="$(uname -m)"
          mv "dist/Speculum-${arch}.AppImage" "dist/Speculum-${{ inputs.version }}-${arch}.AppImage"

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: Speculum-AppImage
          path: dist/*.AppImage
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.version != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ inputs.version }}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "Speculum $tag" --notes ""
          gh release upload "$tag" dist/*.AppImage --clobber
